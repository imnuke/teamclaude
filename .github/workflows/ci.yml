name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  node:
    name: node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        # Cover the whole supported range — package.json declares "node >=18".
        node: [18, 20, 22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Lint
        if: matrix.node == 24
        run: npm run lint

  nix:
    name: nix package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake check (package build + NixOS module VM test)
        run: nix flake check --no-update-lock-file -L

      - name: Smoke test the CLI wrapper
        run: nix run --no-update-lock-file .#teamclaude -- help

  # Single stable status check for branch protection to require, independent of
  # how many implementation jobs run. Always runs and fails explicitly if any
  # required job did not succeed (so it is never silently "skipped").
  test:
    name: test
    needs: [node, nix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        if: needs.node.result != 'success' || needs.nix.result != 'success'
        run: |
          echo "Node job result: ${{ needs.node.result }}"
          echo "Nix package result: ${{ needs.nix.result }}"
          exit 1
      - run: echo "All required jobs passed"
